<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="64" y1="64" x2="448" y2="448" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E7F4FF" />
      <stop offset="1" stop-color="#B8DBFF" />
    </linearGradient>
  </defs>

  <!-- Background rounded rect -->
  <rect x="64" y="64" width="384" height="384" rx="96" fill="url(#bgGradient)" />

  <!-- Shutter aperture centered at 256,256 -->
  <g transform="translate(256,256)">
    <!-- 6 shutter blades: each spans 75deg on outer (R=149), 75deg on inner (r=42), with 15deg twist -->
    <!-- Blade 1 -->
    <path d="M 149,0 A 149,149 0 0,1 38.6,143.9 L 0,42 A 42,42 0 0,0 40.6,10.9 Z" fill="#4F79A6" opacity="1.0" />
    <!-- Blade 2 -->
    <path d="M 149,0 A 149,149 0 0,1 38.6,143.9 L 0,42 A 42,42 0 0,0 40.6,10.9 Z" fill="#4F79A6" opacity="0.85" transform="rotate(60)" />
    <!-- Blade 3 -->
    <path d="M 149,0 A 149,149 0 0,1 38.6,143.9 L 0,42 A 42,42 0 0,0 40.6,10.9 Z" fill="#4F79A6" opacity="1.0" transform="rotate(120)" />
    <!-- Blade 4 -->
    <path d="M 149,0 A 149,149 0 0,1 38.6,143.9 L 0,42 A 42,42 0 0,0 40.6,10.9 Z" fill="#4F79A6" opacity="0.85" transform="rotate(180)" />
    <!-- Blade 5 -->
    <path d="M 149,0 A 149,149 0 0,1 38.6,143.9 L 0,42 A 42,42 0 0,0 40.6,10.9 Z" fill="#4F79A6" opacity="1.0" transform="rotate(240)" />
    <!-- Blade 6 -->
    <path d="M 149,0 A 149,149 0 0,1 38.6,143.9 L 0,42 A 42,42 0 0,0 40.6,10.9 Z" fill="#4F79A6" opacity="0.85" transform="rotate(300)" />

    <!-- Outer rim -->
    <circle r="155" stroke="#113A5F" stroke-width="12" fill="none" />

    <!-- Center opening outline -->
    <circle r="42" stroke="#113A5F" stroke-width="5" fill="none" />
  </g>
</svg>
