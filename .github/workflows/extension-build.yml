name: Extension Build

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-package:
    runs-on: ubuntu-latest

    env:
      BUILD_NUMBER: ${{ github.run_number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Build extension
        run: npm run build:extension

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: indexlens-extension-${{ github.sha }}
          path: dist/
          if-no-files-found: error

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"

          # Check if tag already exists
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "${TAG}"; then
            echo "Tag ${TAG} already exists — version was not bumped. Skipping release."
            exit 0
          fi

          # Zip the dist directory for the release asset
          cd dist && zip -r ../indexlens-v${VERSION}.zip . && cd ..

          # Create tag and release
          gh release create "${TAG}" indexlens-v${VERSION}.zip \
            --title "${TAG}" \
            --generate-notes
